@if (splashState() !== 'gone') {
  <app-splash [leaving]="splashState() === 'leaving'" />
}

<div class="app-shell">
  @if (importService.isImporting()) {
    <div class="import-banner" data-testid="import-banner" role="status">
      <hugeicons-icon [icon]="Loading03Icon" [size]="16" [strokeWidth]="2" color="currentColor" class="import-banner__spinner" />
      <span>
        Importando dados...
        @if (importService.progress(); as progress) {
          {{ progress.done }}/{{ progress.total }}
        }
      </span>
    </div>
  }
  @if (notifications.message(); as message) {
    <div class="toast" data-testid="app-toast" role="status">{{ message }}</div>
  }
  <router-outlet />
</div>
