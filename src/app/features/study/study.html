<header class="app-header">
  <div class="app-header__side">
    <button type="button" class="icon-btn" aria-label="Voltar para a liga" data-testid="back-to-league" (click)="backToLeague()">
      <hugeicons-icon [icon]="ArrowLeft02Icon" [size]="20" [strokeWidth]="1.8" color="currentColor" />
    </button>
    <button type="button" class="icon-btn" aria-label="Início" (click)="back()">
      <hugeicons-icon [icon]="Home01Icon" [size]="20" [strokeWidth]="1.8" color="currentColor" />
    </button>
  </div>
  <div class="app-header__title">Estudo</div>
  <div class="app-header__side">
    <span class="counter-pill">{{ store.total() - store.remaining() }} / {{ store.total() }}</span>
  </div>
</header>

<div class="progress-track" role="progressbar" [attr.aria-valuenow]="store.total() - store.remaining()" aria-valuemin="0" [attr.aria-valuemax]="store.total()">
  <div class="progress-track__fill" [style.width.%]="progressPercent()"></div>
</div>

<main class="screen">
  @if (store.current(); as team) {
    <section class="card study-card">
      <p class="study-card__prompt">De qual time é este escudo?</p>

      <button type="button" class="study-card__badge-btn" data-testid="reveal" [class.is-flipped]="store.revealed()" (click)="store.reveal()" [disabled]="store.revealed()">
        <span class="flip">
          <span class="flip__face flip__face--front" [attr.aria-hidden]="store.revealed() ? true : null">
            <app-team-badge [team]="team" variant="question" />
            <span class="study-card__hint">Toque para revelar</span>
          </span>
          <span class="flip__face flip__face--back" [attr.aria-hidden]="store.revealed() ? null : true">
            <app-team-badge [team]="team" />
            @if (store.revealed()) {
              <span class="study-card__answer">{{ team.name }}</span>
            }
          </span>
        </span>
      </button>
    </section>

    @if (store.revealed()) {
      <div class="grade-row">
        <button type="button" class="grade-btn grade-btn--red" (click)="store.grade('errei')">
          <span>Errei</span>
          <span class="grade-btn__key" aria-hidden="true">1</span>
        </button>
        <button type="button" class="grade-btn grade-btn--orange" (click)="store.grade('dificil')">
          <span>Difícil</span>
          <span class="grade-btn__key" aria-hidden="true">2</span>
        </button>
        <button type="button" class="grade-btn grade-btn--green" (click)="store.grade('acertou')">
          <span>Bom</span>
          <span class="grade-btn__key" aria-hidden="true">3</span>
        </button>
        <button type="button" class="grade-btn grade-btn--blue" (click)="store.grade('facil')">
          <span>Fácil</span>
          <span class="grade-btn__key" aria-hidden="true">4</span>
        </button>
      </div>
    }
  } @else {
    <section class="card empty-state">
      <p class="empty-state__title">Sessão concluída.</p>
      <p class="empty-state__subtitle">Você revisou todos os cartões de hoje.</p>
      <button type="button" class="btn btn--primary" data-testid="start-extra" (click)="store.startExtra()">Nova sessão extra</button>
      <button type="button" class="btn btn--ghost" (click)="backToLeague()">Voltar</button>
    </section>
  }
</main>
