<header class="app-header">
  <div class="app-header__side">
    <a routerLink="/" class="icon-btn" aria-label="Início">
      <hugeicons-icon [icon]="Home01Icon" [size]="20" [strokeWidth]="1.8" color="currentColor" />
    </a>
  </div>
  <div class="app-header__title">Configurações</div>
  <div class="app-header__side"></div>
</header>

<main class="screen">
  <section aria-label="Tema">
    <p class="eyebrow">Tema</p>
    <div class="theme-options" role="radiogroup" aria-label="Tema">
      @for (option of themeOptions; track option.value) {
        <button
          type="button"
          class="theme-option"
          [class.theme-option--active]="theme.preference() === option.value"
          role="radio"
          [attr.aria-checked]="theme.preference() === option.value"
          data-testid="theme-option"
          (click)="selectTheme(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  </section>

  <section aria-label="Dados locais" class="settings-section">
    <p class="eyebrow">Dados do usuário e importações</p>
    @if (hasImportedLeagues()) {
      <button
        type="button"
        class="secondary-action"
        data-testid="refresh-imported-data"
        [disabled]="importService.isImporting()"
        (click)="refreshImportedData()"
      >
        <hugeicons-icon [icon]="RefreshIcon" [size]="18" [strokeWidth]="1.8" color="currentColor" />
        @if (importService.isImporting()) {
          Atualizando{{ importService.progress() ? ' (' + importService.progress()!.done + '/' + importService.progress()!.total + ')' : '' }}...
        } @else {
          Atualizar dados
        }
      </button>
    }
    <button type="button" class="danger-action" data-testid="clear-local-data" (click)="clearLocalData()">
      <hugeicons-icon [icon]="Delete01Icon" [size]="18" [strokeWidth]="1.8" color="currentColor" />
      Limpar tudo e reiniciar
    </button>
  </section>
</main>
