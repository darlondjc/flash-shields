name: Generate game badge candidates

# Roda algumas horas depois do sync semanal da Vercel (vercel.json:
# "0 6 * * 1"), pra dar tempo dos escudos novos já estarem no Firestore.
# Só gera candidatos (Firestore + Vercel Blob) — nunca publica sozinho, isso
# continua manual via `node scripts/game-badges.mjs review` / `publish`
# rodado localmente (scripts/game-badges.mjs tem o motivo comentado).
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      only:
        description: 'IDs de time separados por vírgula (vazio = todos que precisam)'
        required: false
        default: ''
      force:
        description: 'Reprocessar mesmo quem já está em dia (útil pra testar mudanças no blur)'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # There's no long-lived BLOB_READ_WRITE_TOKEN to store as a secret, so
      # authenticate via OIDC instead: OIDC federation is enabled for the
      # "production" environment (not "development"), so pulling production
      # env vars here gives us a short-lived VERCEL_OIDC_TOKEN + BLOB_STORE_ID
      # into .env.production.local — game-badges.mjs's loadEnv() picks those
      # up automatically, and @vercel/blob's put() authenticates via OIDC
      # whenever no explicit token is passed. (An earlier version of this
      # step minted a signed Blob token via `vercel blob signed-token`, but
      # newer CLI versions changed that command's output to a
      # delegationToken/clientSigningToken pair meant for presigned client
      # uploads — not a drop-in BLOB_READ_WRITE_TOKEN — so it stopped working.)
      - name: Pull Vercel Blob OIDC credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest env pull .env.production.local --environment=production --token="$VERCEL_TOKEN"

      # FIREBASE_* must come from GitHub secrets, not from the
      # .env.production.local pulled above: those Firebase vars are marked
      # "Sensitive" in the Vercel dashboard, and Sensitive vars are never
      # readable via `vercel env pull`/CLI (always come back as the literal
      # string "[SENSITIVE]") — only injected at runtime inside Vercel's own
      # builds/functions. VERCEL_OIDC_TOKEN/BLOB_STORE_ID aren't Sensitive,
      # so those two still come from the previous step's pulled file.
      - name: Generate game badge candidates
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: >-
          node scripts/game-badges.mjs generate
          ${{ inputs.only && format('--only {0}', inputs.only) || '' }}
          ${{ inputs.force && '--force' || '' }}
