name: Diagnose PaddleOCR detection

# Disparo manual só pra depurar por que o PaddleOCR não detecta (ou detecta
# mal) texto em um escudo específico — roda scripts/paddle_diagnose.py, que
# imprime TODAS as detecções brutas (sem os filtros de confiança/tamanho que
# scripts/paddle_detect_blur.py aplica) direto no log do job. Não escreve em
# lugar nenhum (Firestore/Blob) — puramente leitura, sem efeitos colaterais.
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs dos escudos, separadas por vírgula'
        required: true
      det_db_box_thresh:
        description: 'det_db_box_thresh (padrão PP-OCR: 0.6 — menor = mais permissivo)'
        required: false
        default: ''
      det_db_unclip_ratio:
        description: 'det_db_unclip_ratio (padrão PP-OCR: 1.5 — maior = expande/funde mais)'
        required: false
        default: ''
      det_limit_side_len:
        description: 'det_limit_side_len (padrão PP-OCR: 960 — maior = mais resolução)'
        required: false
        default: ''

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run diagnosis
        env:
          PADDLE_DET_DB_BOX_THRESH: ${{ inputs.det_db_box_thresh }}
          PADDLE_DET_DB_UNCLIP_RATIO: ${{ inputs.det_db_unclip_ratio }}
          PADDLE_DET_LIMIT_SIDE_LEN: ${{ inputs.det_limit_side_len }}
        run: |
          IFS=',' read -ra URLS <<< "${{ inputs.urls }}"
          python3 scripts/paddle_diagnose.py "${URLS[@]}"
